<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Life After</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <header class="header">
        <img src="logo-life-after.png" alt="Life After Logo" class="logo" />
    </header>

    <main class="main-content">
        <h1>Share Your Story of Recovery</h1>
        <p>
            Life After is a documentary series about people who have moved through trauma and into healing. Your story could help someone else take the first step.
        </p>
        <a href="#formSection" class="cta-button">Tell Us Your Story</a>
    </main>

    <section class="form-section" id="formSection">
        <h2>Your Story Matters</h2>
        <form action="https://formspree.io/f/myzjebel" method="POST">
            <label for="name">Name *</label>
            <input type="text" id="name" name="name" required />

            <label for="email">Email *</label>
            <input type="email" id="email" name="email" required />

            <label for="trauma">What kind of trauma have you experienced? *</label>
            <textarea id="trauma" name="trauma" required></textarea>

            <label for="recovery">What helped you begin to heal? *</label>
            <textarea id="recovery" name="recovery" required></textarea>

            <label for="camera">Are you open to sharing on camera? *</label>
            <select id="camera" name="camera" required>
                <option value="">Please select...</option>
                <option value="yes">Yes</option>
                <option value="maybe">Maybe</option>
                <option value="no">No</option>
            </select>

            <label for="additional">Anything else to share?</label>
            <textarea id="additional" name="additional"></textarea>

            <button type="submit" class="submit-button">Submit</button>
        </form>
    </section>

    <footer class="footer">
        <p>© 2025 Life After Documentary Series</p>
        <p><a href="mailto:info@lifeafterseries.org">info@lifeafterseries.org</a></p>
    </footer>
</body>
</html>
